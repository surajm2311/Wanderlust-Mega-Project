apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wanderlust-network-policy
  namespace: wanderlust
  labels:
    app: wanderlust
    component: security
spec:
  podSelector: {}  # Applies to all pods in namespace
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Ingress Controller (NGINX)
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
    # Allow pods to communicate within namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: wanderlust
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Allow backend to connect to MongoDB
    - to:
        - podSelector:
            matchLabels:
              app: mongo
      ports:
        - protocol: TCP
          port: 27017
    # Allow backend to connect to Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow external HTTPS (for API calls, package downloads, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    # Allow external HTTP (for package downloads, etc.)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80
    # Allow NTP (for time synchronization)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 123


apiVersion: v1
kind: LimitRange
metadata:
  name: wanderlust-limit-range
  namespace: wanderlust
  labels:
    app: wanderlust
    component: resource-management
spec:
  limits:
    # Default limits for containers
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      type: Container
    # Limits for pods
    - max:
        cpu: "2"
        memory: "2Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      type: Pod
    # Limits for PVCs
    - max:
        storage: 10Gi
      min:
        storage: 1Gi
      type: PersistentVolumeClaim

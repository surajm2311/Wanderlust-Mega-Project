apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: wanderlust
  labels:
    app: mongo
    component: database
    version: v1
spec:
  replicas: 1  # MongoDB single instance - for production consider MongoDB replica set
  strategy:
    type: Recreate  # Recreate strategy for stateful apps with persistent storage
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      name: mongo
      labels:
        app: mongo
        component: database
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "27017"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999  # MongoDB user ID
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mongo
          image: mongo:7.0  # Pinned version for production
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
              protocol: TCP
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: username
                  optional: true
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: password
                  optional: true
            - name: MONGO_INITDB_DATABASE
              value: "wanderlust"
          command:
            - mongod
            - "--bind_ip_all"
            - "--wiredTigerCacheSizeGB"
            - "1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # MongoDB needs write access
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - FOWNER
                - SETGID
                - SETUID
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
            - name: mongo-config
              mountPath: /etc/mongod.conf
              subPath: mongod.conf
              readOnly: true
              optional: true
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
        - name: mongo-config
          configMap:
            name: mongo-config
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: wanderlust
  labels:
    app: mongo
    component: database
spec:
  type: ClusterIP  # Internal service - not exposed externally for security
  selector:
    app: mongo
  ports:
    - name: mongodb
      port: 27017
      targetPort: 27017
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongo-config
  namespace: wanderlust
data:
  mongod.conf: |
    storage:
      dbPath: /data/db
      journal:
        enabled: true
    systemLog:
      destination: file
      logAppend: true
      path: /var/log/mongodb/mongod.log
    net:
      port: 27017
      bindIp: 0.0.0.0
    processManagement:
      fork: false
---
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: wanderlust
type: Opaque
stringData:
  username: admin
  password: changeme  # ⚠️ CHANGE THIS IN PRODUCTION! Use strong password
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mongo-pdb
  namespace: wanderlust
spec:
  minAvailable: 1  # Ensure MongoDB is always available
  selector:
    matchLabels:
      app: mongo
